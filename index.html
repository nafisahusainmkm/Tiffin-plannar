<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSB Educational Institute - Tiffin Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Quicksand', sans-serif; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-4">

  <div class="max-w-2xl mx-auto">
    
    <!-- 1. Header with Monogram -->
    <div class="flex items-center gap-4 bg-white p-4 rounded-2xl shadow-sm mb-6 border border-gray-100">
      <img src="https://raw.githubusercontent.com/nafisahusainmkm/Tiffin-plannar/main/1001296689.png" alt="School Logo" class="w-16 h-16 object-contain">
      <div>
        <h1 id="pageTitle" class="text-xl font-bold text-gray-800">July Tiffin Planner</h1>
        <p class="text-xs text-gray-500">MSB Educational Institute, Kota</p>
      </div>
    </div>

    <!-- 2. Disclaimer -->
    <div class="bg-amber-50 border-l-4 border-amber-400 p-4 mb-6 rounded-r-lg">
      <p class="text-sm font-semibold text-amber-900">Important Note:</p>
      <p class="text-xs text-amber-800 mt-1">
        Instead of vegetables, you can also send healthy dry snacks like <strong>dates, roasted makhana, or peanuts</strong> as alternative side food.
      </p>
    </div>

    <!-- 3. Calendar Grid -->
    <div id="calendar" class="grid grid-cols-7 gap-2 text-center text-xs">
      <div class="font-bold text-gray-400">S</div>
      <div class="font-bold text-gray-400">M</div>
      <div class="font-bold text-gray-400">T</div>
      <div class="font-bold text-gray-400">W</div>
      <div class="font-bold text-gray-400">T</div>
      <div class="font-bold text-gray-400">F</div>
      <div class="font-bold text-gray-400">S</div>
      <!-- Days will be injected here -->
    </div>

    <!-- 4. Teacher Actions (Hidden by default) -->
    <div id="teacherActions" class="mt-8 hidden text-center">
      <button onclick="saveChanges()" class="bg-green-600 text-white py-2 px-6 rounded-lg font-bold">Save Changes</button>
    </div>
  </div>

  <!-- Recipe Modal -->
  <div id="recipeModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
      <h2 id="modalTitle" class="text-lg font-bold text-gray-800 mb-2"></h2>
      <p id="modalRecipe" class="text-sm text-gray-600 mb-4"></p>
      <button onclick="closeModal()" class="w-full bg-gray-800 text-white py-2 rounded-lg font-bold">Close</button>
    </div>
  </div>

  <script>
    // --- Configuration ---
    const urlParams = new URLSearchParams(window.location.search);
    const targetClass = urlParams.get('class') || 'nursery';
    const isTeacher = (urlParams.get('mode') === 'teacher' && urlParams.get('secret') === 'MSB2026');
    const storageKey = `menu_${targetClass}`;

    // --- Data ---
    const recipes = {
      "Veg Poha": "Wash poha. Heat oil, add mustard seeds, curry leaves, onions, turmeric, peas/carrots. Mix in poha and salt.",
      "Mini Idlis": "Steam for 7-8 minutes. Toss with ghee and mild podi powder.",
      "Stuffed Paratha": "Mash potato/paneer, season, fill in dough, roll gently, and cook on tawa with ghee.",
      "Cheese Sandwich": "Butter bread, place cheese, toast lightly on pan.",
      "Macaroni": "Boil pasta. Sauté carrots/corn in butter, toss pasta with mild tomato puree.",
      "Aloo Puri": "Knead dough, make small puris, fry until puffed. Serve with potato subji.",
      "Dhokla Bits": "Steam besan batter for 15 mins. Temper with mustard seeds.",
      "Paneer Wrap": "Sauté paneer with onions/spices. Wrap in soft chapati with ketchup.",
      "Vermicelli": "Roast vermicelli. Sauté mustard/onions/veggies, add water/vermicelli, cook till absorbed.",
      "Veg Cutlet": "Mash boiled potatoes/carrots/peas with spices. Shallow fry.",
      "Appam Rounds": "Pour rice batter into appam pan holes, cook until golden.",
      "Pancake Bits": "Mix wheat flour/milk/jaggery. Cook small drops on skillet.",
      "Sabudana Khichdi": "Soak sabudana. Sauté cumin/chilies/peanuts. Toss with sabudana.",
      "Corn Chaat": "Steam corn, mix with cucumber, lemon, and salt.",
      "Idli Fries": "Cut idli into strips, roast with ghee/podi.",
      "Wheat Pasta": "Boil pasta, toss with olive oil, peppers, corn, herbs.",
      "Besan Chilla": "Whisk besan, water, coriander, carom seeds. Spread thinly on pan.",
      "Bread Upma": "Sauté mustard/onions/turmeric. Add bread bits.",
      "Pav Bhaji Bits": "Mash veggies, cook with spices. Serve with buttered mini pavs.",
      "Sprout Salad": "Steam sprouts, mix with tomato, pomegranate, lemon.",
      "Makhana Roast": "Dry roast makhana with ghee, salt, and turmeric.",
      "Fruit Platter": "Chop fresh seasonal fruits.",
      "Special Kheer": "Simmer milk and rice until thick, sweeten with jaggery."
    };

    let menuData = JSON.parse(localStorage.getItem(storageKey)) || {
      1: "Veg Poha", 2: "Mini Idlis", 3: "Stuffed Paratha", 6: "Cheese Sandwich",
      7: "Macaroni", 8: "Aloo Puri", 9: "Dhokla Bits", 10: "Paneer Wrap",
      13: "Vermicelli", 14: "Veg Cutlet", 15: "Appam Rounds", 16: "Pancake Bits",
      17: "Sabudana Khichdi", 20: "Corn Chaat", 21: "Idli Fries", 22: "Wheat Pasta",
      23: "Besan Chilla", 24: "Bread Upma", 27: "Pav Bhaji Bits", 28: "Sprout Salad",
      29: "Makhana Roast", 30: "Fruit Platter", 31: "Special Kheer"
    };

    // --- Logic ---
    const calendar = document.getElementById('calendar');
    if (isTeacher) document.getElementById('teacherActions').classList.remove('hidden');

    // 3 empty spacers for July 1st (Wednesday)
    for(let i=0; i<3; i++) calendar.innerHTML += `<div></div>`;

    for(let i=1; i<=31; i++) {
      let dish = menuData[i] || "";
      let cell = document.createElement('div');
      cell.className = "p-2 border rounded-lg bg-white h-16 flex flex-col items-center justify-center cursor-pointer";
      
      if(isTeacher) {
        cell.innerHTML = `<span class="text-[8px]">${i}</span><input value="${dish}" onchange="update(${i}, this.value)" class="w-full text-center text-[10px]">`;
      } else {
        cell.onclick = () => openModal(dish);
        cell.innerHTML = `<span class="text-[8px]">${i}</span><span class="text-[10px] font-bold">${dish}</span>`;
      }
      calendar.appendChild(cell);
    }

    function update(day, val) { menuData[day] = val; }
    function saveChanges() { localStorage.setItem(storageKey, JSON.stringify(menuData)); alert("Saved!"); }
    
    function openModal(dish) {
      if(!dish || !recipes[dish]) return;
      document.getElementById('modalTitle').innerText = dish;
      document.getElementById('modalRecipe').innerText = recipes[dish];
      document.getElementById('recipeModal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('recipeModal').classList.add('hidden'); }
  </script>
</body>
</html>
