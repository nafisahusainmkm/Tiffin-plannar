<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSB Tiffin Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Quicksand', sans-serif; background: #fff5f7; } .font-header { font-family: 'Fredoka One', cursive; }</style>
</head>
<body class="p-4 md:p-10">

    <div class="text-center mb-10">
        <h1 class="text-xs font-bold uppercase tracking-[0.3em] text-pink-500">MSB Educational Institute, Kota</h1>
        <h2 id="classNameDisplay" class="text-5xl font-header text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 uppercase mt-2">Loading...</h2>
        <div id="studentCount" class="inline-block mt-4 bg-white px-6 py-2 rounded-full font-bold text-pink-600 shadow-lg border-2 border-pink-200">...</div>
        <div class="mt-4 bg-pink-500 text-white font-bold py-2 px-8 rounded-full inline-block shadow-lg">JULY 2026 TIFFIN PLANNER</div>
    </div>

    <!-- Master Register -->
    <div class="max-w-6xl mx-auto mb-12 text-center">
        <button onclick="document.getElementById('masterRegisterContainer').classList.toggle('hidden')" class="bg-violet-500 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:bg-violet-600">📋 View Master Tiffin Register</button>
        <div id="masterRegisterContainer" class="hidden mt-6 p-8 bg-white rounded-[2rem] shadow-lg border-4 border-violet-100 overflow-x-auto">
            <h3 class="font-header text-2xl text-violet-600 mb-6">Master Tiffin Register (All Classes)</h3>
            <table class="w-full text-sm text-slate-700 border-collapse border border-violet-200 text-center"><tbody id="masterTableBody"></tbody></table>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="plannerGrid"></div>

    <script>
        // CONFIGURATION: Add your students here
        const data = {
            "nursery": { name: "Nursery", count: "21", students: ["-", "Fatema B", "Nafisa S", "Abbas T", "Zainab F", "-", "Husaina H", "Juzer R", "Burhanuddin R", "Saifuddin I"] },
            "lkg": { name: "LKG", count: "20", students: ["-", "Nafisa B", "Aliasger R", "Hasan B", "Husaina R", "-", "Mohammad L", "Nisreen M", "Fatema M", "Insiya S"] },
            "prefirst": { name: "Pre-First", count: "23", students: ["-", "Ajab S", "Amatullah R", "Burhanuddin B", "Burhanuddin M", "-", "Husain K", "Hussaina K", "Mohammed R"] }
        };

        // Auto-detect class based on filename in URL
        const path = window.location.pathname.toLowerCase();
        const currentKey = path.includes("lkg") ? "lkg" : (path.includes("prefirst") ? "prefirst" : "nursery");
        const currentClass = data[currentKey];

        document.getElementById('classNameDisplay').innerText = currentClass.name;
        document.getElementById('studentCount').innerText = "Total Students: " + currentClass.count;

        const planner = [
            { date: "20 JUL", dish: "SELF LUNCH BOX DAY", portion: "Student's choice" },
            { date: "21 JUL", dish: "Mini Vegetable Idli", portion: "3 Mini Idlis" },
            { date: "22 JUL", dish: "Paneer Paratha + Dip", portion: "1 Paratha + Dip" },
            { date: "23 JUL", dish: "Veg Besan Chilla", portion: "2 Chillas" },
            { date: "24 JUL", dish: "Whole Wheat Pasta", portion: "1 Bowl" },
            { date: "27 JUL", dish: "SELF LUNCH BOX DAY", portion: "Student's choice" },
            { date: "28 JUL", dish: "Chicken Gravy & Roti", portion: "1 Roti + Gravy" },
            { date: "29 JUL", dish: "Vegetable Appe", portion: "5 Mini Appes" },
            { date: "30 JUL", dish: "Keema-Potato Samosa", portion: "2 Samosas" },
            { date: "31 JUL", dish: "Vegetable Quesadilla", portion: "1 Quesadilla" }
        ];

        const grid = document.getElementById('plannerGrid');
        planner.forEach((item, i) => {
            grid.innerHTML += `<div class="bg-white p-6 rounded-[2rem] border-4 border-slate-100 shadow-lg">
                <div class="bg-pink-400 text-white font-bold px-4 py-1 rounded-full text-xs inline-block mb-3">${item.date}</div>
                <h3 class="font-header text-xl text-slate-800">${item.dish}</h3>
                <p class="bg-pink-50 text-pink-600 font-bold p-3 rounded-xl my-4 text-center">${currentClass.students[i] || "Self Lunch Day"}</p>
                <p class="text-xs text-slate-500">🍱 ${item.portion}</p>
            </div>`;
        });
    </script>
</body>
</html>
