<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSB Nursery | July Tiffin Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fff8f1; }
        h1, h2, .font-title { font-family: 'Fredoka', sans-serif; }
    </style>
</head>
<body class="pb-16">

    <div class="bg-gradient-to-b from-orange-400 to-amber-400 text-white p-6 rounded-b-[3rem] shadow-xl text-center">
        <h1 class="text-4xl font-bold tracking-tight">JULY 2026</h1>
        <p class="text-lg font-semibold opacity-90">Nursery Tiffin Planner</p>
    </div>

    <div class="max-w-4xl mx-auto px-4 mt-8">
        <div id="plannerGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

        <!-- Recipe Modal -->
        <div id="recipeModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl">
                <h2 id="modalTitle" class="text-2xl font-bold text-orange-600 mb-2">Recipe</h2>
                <p id="modalSteps" class="text-slate-600 text-sm mb-4"></p>
                <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-2 rounded-xl">Close</button>
            </div>
        </div>

        <!-- Direct Email Feedback Section -->
        <div class="mt-12 bg-white p-8 rounded-3xl border-2 border-orange-200 shadow-sm text-center">
            <h2 class="text-xl font-bold text-orange-600 mb-2">Questions or Suggestions?</h2>
            <p class="text-sm text-slate-500 mb-6">Click below to send us an email directly.</p>
            <a href="mailto:nafisa.preprimary.hos@gmail.com" class="inline-block bg-orange-500 text-white px-10 py-4 rounded-2xl font-bold text-lg hover:bg-orange-600 shadow-lg">
                Email the School
            </a>
        </div>
    </div>

    <script>
        const plannerData = [
            { date: "21 Jul", dish: "Mini Vegetable Idli", name: "Fatema Bilaspurwala", portion: "½ cup cucumber", recipe: "Steam batter with grated carrots and peas." },
            { date: "22 Jul", dish: "Paneer Paratha + Herb Curd", name: "Nafisa Shakir", portion: "½ cup carrot & beetroot", recipe: "Stuff dough with spiced paneer, serve with curd." },
            { date: "23 Jul", dish: "Veg Besan Chilla + Mayo", name: "Abbas Tyerwala", portion: "½ cup cucumber", recipe: "Whisk flour with veggies and shallow fry." },
            { date: "24 Jul", dish: "Whole Wheat Pasta", name: "Zainab Faizy", portion: "½ cup tomatoes", recipe: "Boil pasta and toss with tomato base." },
            { date: "28 Jul", dish: "Chicken-Roti", name: "Husaina Hamid", portion: "½ cup cucumber", recipe: "Sauté chicken strips and roll in roti." },
            { date: "29 Jul", dish: "Vegetable Appe", name: "Juzer Rangwala", portion: "½ cup carrot & beetroot", recipe: "Cook batter in appe pan with veggies." },
            { date: "30 Jul", dish: "Keema + Potato Samosa", name: "Burhanuddin Rangwala", portion: "½ cup cucumber", recipe: "Stuff triangles and bake until golden." },
            { date: "31 Jul", dish: "Mini Veg Pizza", name: "Saifuddin Imadi", portion: "½ cup tomatoes", recipe: "Use roti base, top with sauce and cheese." }
        ];

        const grid = document.getElementById('plannerGrid');
        plannerData.forEach(item => {
            grid.innerHTML += `
                <div class="bg-white p-5 rounded-3xl shadow-sm border-2 border-orange-100 hover:border-orange-300 transition-all">
                    <div class="flex justify-between items-center mb-2">
                        <span class="bg-orange-100 text-orange-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase">${item.date}</span>
                    </div>
                    <h3 class="font-bold text-slate-800 text-lg">${item.dish}</h3>
                    <p class="text-sm text-indigo-600 font-semibold mb-1">Student: ${item.name}</p>
                    <p class="text-[11px] text-slate-500 mb-4">Portion: ${item.portion}</p>
                    <button onclick="openModal('${item.dish}', '${item.recipe}')" class="text-sm text-orange-600 font-bold underline">View Recipe</button>
                </div>
            `;
        });

        function openModal(title, steps) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalSteps').innerText = steps;
            document.getElementById('recipeModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('recipeModal').classList.add('hidden');
        }
    </script>
</body>
</html>
