<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSB Tiffin Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Quicksand', sans-serif; background: #fff5f7; } .font-header { font-family: 'Fredoka One', cursive; }</style>
</head>
<body class="p-4 md:p-10">

    <div class="text-center mb-10">
        <h1 class="text-xs font-bold uppercase tracking-[0.3em] text-pink-500">MSB Educational Institute, Kota</h1>
        <h2 id="classNameDisplay" class="text-5xl font-header text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500 uppercase mt-2">Pre-First</h2>
        <div id="studentCount" class="inline-block mt-4 bg-white px-6 py-2 rounded-full font-bold text-pink-600 shadow-lg border-2 border-pink-200">Total Students: 23</div>
        <div class="mt-4 bg-pink-500 text-white font-bold py-2 px-8 rounded-full inline-block shadow-lg">JULY 2026 TIFFIN PLANNER</div>
    </div>

    <!-- Master Register -->
    <div class="max-w-6xl mx-auto mb-12 text-center">
        <button onclick="document.getElementById('masterRegisterContainer').classList.toggle('hidden')" class="bg-violet-500 text-white font-bold py-3 px-6 rounded-full shadow-lg hover:bg-violet-600">📋 Click here to view Master Tiffin Register (Other Classes)</button>
        <div id="masterRegisterContainer" class="hidden mt-6 p-8 bg-white rounded-[2rem] shadow-lg border-4 border-violet-100 overflow-x-auto">
            <h3 class="font-header text-2xl text-violet-600 mb-6">Master Tiffin Register (All Classes)</h3>
            <table class="w-full text-sm text-slate-700 border-collapse border border-violet-200 text-center">
                <thead class="bg-violet-50">
                    <tr>
                        <th class="border border-violet-200 px-4 py-2">Date</th>
                        <th class="border border-violet-200 px-4 py-2">Dish</th>
                        <th class="border border-violet-200 px-4 py-2">Nursery</th>
                        <th class="border border-violet-200 px-4 py-2">LKG</th>
                        <th class="border border-violet-200 px-4 py-2">Pre-first</th>
                    </tr>
                </thead>
                <tbody id="masterTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="plannerGrid"></div>

    <script>
        // CORRECTED Pre-First Student List matching Master Register sequence
        const currentClassStudents = [
            "-", // 20 JUL
            "Ajab sailanawala", // 21 JUL
            "Amatullah Ratlamwala", // 22 JUL
            "Burhanuddin Bahrainwala", // 23 JUL
            "Burhanuddin Muffadal Patanwala", // 24 JUL
            "-", // 27 JUL
            "Burhanuddin Juzer Patanwala", // 28 JUL
            "Husain Kushalgarh", // 29 JUL
            "Hussaina kantabatwala", // 30 JUL
            "Mohammed Rangwala" // 31 JUL
        ];

        const planner = [
            { date: "20 JUL", dish: "SELF LUNCH BOX DAY", portion: "Student's choice" },
            { date: "21 JUL", dish: "Mini Vegetable Idli", portion: "3 Mini Idlis per student" },
            { date: "22 JUL", dish: "Paneer Paratha + Dip", portion: "1 Paratha + Dip" },
            { date: "23 JUL", dish: "Veg Besan Chilla", portion: "2 Chillas + Chutney" },
            { date: "24 JUL", dish: "Whole Wheat Pasta", portion: "1 Small bowl" },
            { date: "27 JUL", dish: "SELF LUNCH BOX DAY", portion: "Student's choice" },
            { date: "28 JUL", dish: "Chicken Gravy & Roti", portion: "Mild chicken gravy + 1 Roti" },
            { date: "29 JUL", dish: "Vegetable Appe", portion: "5 Mini Appes" },
            { date: "30 JUL", dish: "Keema-Potato Samosa", portion: "2 Small Samosas" },
            { date: "31 JUL", dish: "Vegetable Quesadilla", portion: "1 palm-sized Quesadilla" }
        ];

        const masterRegister = [
            { d: "21 Jul", dish: "Mini Veg Idli", n: "Fatema Bilaspurwala", l: "Nafisa Bahrainwala", p: "Ajab sailanawala" },
            { d: "22 Jul", dish: "Paneer Paratha + Dip", n: "Nafisa Shakir", l: "Aliasger Ragib", p: "Amatullah Ratlamwala" },
            { d: "23 Jul", dish: "Veg Chilla + Chutney", n: "Abbas Tyerwala", l: "Hasan Baran wala", p: "Burhanuddin Bahrainwala" },
            { d: "24 Jul", dish: "Whole Wheat Pasta", n: "Zainab Faizy", l: "Husaina Rangwala", p: "Burhanuddin Muffadal Patanwala" },
            { d: "28 Jul", dish: "Chicken-Roti", n: "Husaina Hamid", l: "Mohammad Lokhandwala", p: "Burhanuddin Juzer Patanwala" },
            { d: "29 Jul", dish: "Vegetable Appe", n: "Juzer Rangwala", l: "Nisreen Medical wala", p: "Husain Kushalgarh" },
            { d: "30 Jul", dish: "Keema-Potato Samosa", n: "Burhanuddin Rangwala", l: "Fatema Mhowwala", p: "Hussaina kantabatwala" },
            { d: "31 Jul", dish: "Mini Veg Quesadillas", n: "Saifuddin Imadi", l: "Insiya Shakir", p: "Mohammed Rangwala" }
        ];

        const tbody = document.getElementById('masterTableBody');
        masterRegister.forEach(row => {
            tbody.innerHTML += `<tr>
                <td class="border border-violet-200 px-4 py-2 font-bold">${row.d}</td>
                <td class="border border-violet-200 px-4 py-2">${row.dish}</td>
                <td class="border border-violet-200 px-4 py-2 text-xs">${row.n}</td>
                <td class="border border-violet-200 px-4 py-2 text-xs">${row.l}</td>
                <td class="border border-violet-200 px-4 py-2 text-xs">${row.p}</td>
            </tr>`;
        });

        const grid = document.getElementById('plannerGrid');
        planner.forEach((item, i) => {
            grid.innerHTML += `<div class="bg-white p-6 rounded-[2rem] border-4 border-slate-100 shadow-lg">
                <div class="bg-pink-400 text-white font-bold px-4 py-1 rounded-full text-xs inline-block mb-3">${item.date}</div>
                <h3 class="font-header text-xl text-slate-800">${item.dish}</h3>
                <p class="bg-pink-50 text-pink-600 font-bold p-3 rounded-xl my-4 text-center">${currentClassStudents[i] || "Self Lunch Day"}</p>
                <p class="text-xs text-slate-500">🍱 ${item.portion}</p>
            </div>`;
        });
    </script>
</body>
</html>
